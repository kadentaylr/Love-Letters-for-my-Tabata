<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Tábata ❤️</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div id="overlay">
<div class="envelope" onclick="openLetter()">
<div class="flap"></div>
<div class="body"></div>
<div class="label">For Tábata ❤️</div>
</div>
<p>Tap the envelope</p>
</div>

<div id="content" class="hidden">
<header>
<h1>Love Letters for Tábata 💕</h1>
<nav>
<a href="#today">Today's Letter</a>
<a href="#gallery">Gallery</a>
<a href="#countdown">Countdown</a>
</nav>
</header>

<section id="today" class="paper">
    <h2>Today's Letter ❤️</h2>
    <div id="todayLetter"></div>
</section>

<section id="archive" class="paper">
    <h2>Letter Archive 💌</h2>
    <div id="archiveList"></div>
</section>

<section id="countdown" class="paper">
<h2>Until We Meet Again</h2>
<div id="timer"></div>
</section>

<section id="gallery" class="paper">
<h2>Memory Gallery</h2>
<img src="photos/beach.jpg" class="photo">
<p>The day I decided to spend my life loving you ridiculously.</p>
</section>

</div>
<script src="script.js"></script>
</body></html>
